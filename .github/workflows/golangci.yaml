name: Golang ci
on:
  # don't build any branch other than master (and prs) when git pushed
  pull_request: {}
  push:
    branches:
      - master
      - "/^v\\d+\\.\\d+(\\.\\d+)?(-\\S*)?$/"
    paths-ignore:
      - "**/*.md"

permissions:
  contents: read
  pull-requests: read

jobs:
  lint:
    name: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: golangci-lint
        uses: golangci/golangci-lint-action@v9.2.1
        with:
          version: v2.12.2
          install-mode: goinstall

  coverage:
    needs: [lint]
    name: coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Unit tests and coverage
        run: make cov

  integration-test-linux:
    needs: [coverage]
    name: Integration tests (linux/${{ matrix.distro }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        distro: [rockylinux9, almalinux10, bullseye, jammy, alpine3, arch, test-int-serve-linux-amd64]
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Integration tests
        shell: bash
        run: make ${{ matrix.distro }}

  integration-test-other:
    needs: [coverage]
    name: Integration tests (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-go@v6.4.0
        with:
          go-version-file: go.mod

      - name: Integration tests
        shell: bash
        run: |
          os_name="$(go env GOOS)"
          arch="$(go env GOARCH)"
          make "test-int-validate-${os_name}-${arch}" "test-int-serve-${os_name}-${arch}"
